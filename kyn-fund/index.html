<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kyn's Investment Fund</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8edf5 50%, #f5f0ff 100%);
    color: #1a1a2e;
    line-height: 1.6;
    padding: 20px 16px;
    max-width: 940px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    position: relative;
  }
  .app-header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .lock-btn {
    position: absolute;
    right: 0;
    background: none;
    border: 1px solid #d1d5db;
    color: #6b7280;
    font-size: .75rem;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    transition: all .2s;
  }
  .lock-btn:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }

  /* Section label */
  h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 14px;
    color: #374151;
    letter-spacing: -0.2px;
  }

  /* Dashboard cards */
  .cards { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 18px;
    flex: 1 1 220px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    border: 1px solid rgba(0,0,0,.04);
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .card.grand {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    border: none;
  }
  .card .label { font-size: .78rem; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .card.grand .label { color: rgba(255,255,255,.7); }
  .card .value { font-size: 1.5rem; font-weight: 800; margin-top: 4px; letter-spacing: -0.5px; }
  .card .meta { font-size: .73rem; color: #9ca3af; margin-top: 6px; }
  .card.grand .meta { color: rgba(255,255,255,.6); }
  .card .current-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: .85rem; }
  .card .current-label { color: #9ca3af; font-size: .75rem; }
  .card.grand .current-label { color: rgba(255,255,255,.6); }
  .card .current-val { font-weight: 700; }
  .card .gain { font-size: .83rem; font-weight: 700; margin-top: 4px; }
  .gain-pos { color: #059669; }
  .gain-neg { color: #dc2626; }
  .gain-neutral { color: #9ca3af; }
  .card.grand .gain-pos, .card.grand .gain-neg, .card.grand .gain-neutral { color: rgba(255,255,255,.85); }

  .update-val-btn { background: none; border: none; color: #6366f1; font-size: .73rem; cursor: pointer; padding: 2px 0; font-weight: 600; }
  .card.grand .update-val-btn { color: rgba(255,255,255,.75); }
  .update-val-btn:hover { opacity: .7; }
  .update-val-form { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
  .update-val-form input { width: 120px; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: .85rem; }
  .update-val-form button { padding: 6px 12px; font-size: .8rem; border-radius: 8px; }

  /* Forms */
  .form-section {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    border: 1px solid rgba(0,0,0,.04);
  }
  .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
  .form-group { display: flex; flex-direction: column; flex: 1 1 140px; }
  .form-group label { font-size: .78rem; font-weight: 600; margin-bottom: 5px; color: #4b5563; }
  .form-group input, .form-group select {
    padding: 9px 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    font-size: .9rem;
    background: #fafbfc;
    transition: border-color .15s, box-shadow .15s;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.12);
  }
  button {
    padding: 9px 20px;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 600;
    white-space: nowrap;
    transition: opacity .15s, transform .1s;
  }
  button:hover { opacity: .9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* Secondary / danger buttons */
  .btn-secondary {
    background: #f3f4f6;
    color: #374151;
    font-weight: 500;
  }
  .btn-secondary:hover { background: #e5e7eb; opacity: 1; }
  .btn-danger {
    background: #fef2f2;
    color: #dc2626;
    font-weight: 500;
  }
  .btn-danger:hover { background: #fee2e2; opacity: 1; }
  .btn-sm { padding: 5px 10px; font-size: .78rem; border-radius: 7px; }

  /* Filter */
  .filter-bar { margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .filter-bar label { font-size: .85rem; font-weight: 600; color: #4b5563; }
  .filter-bar select {
    padding: 7px 12px;
    border-radius: 10px;
    border: 1.5px solid #e5e7eb;
    font-size: .85rem;
    background: #fff;
    transition: border-color .15s;
  }
  .filter-bar select:focus { outline: none; border-color: #6366f1; }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    border: 1px solid rgba(0,0,0,.04);
    margin-bottom: 24px;
  }
  table { width: 100%; border-collapse: collapse; font-size: .86rem; }
  th, td { padding: 11px 14px; text-align: left; border-bottom: 1px solid #f3f4f6; }
  th {
    background: #f9fafb;
    font-weight: 700;
    font-size: .76rem;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: #6b7280;
    position: sticky;
    top: 0;
  }
  tbody tr { transition: background .1s; }
  tbody tr:hover { background: #f8f9ff; }
  tbody tr:last-child td { border-bottom: none; }
  .amt-pos { color: #059669; font-weight: 700; }
  .amt-neg { color: #dc2626; font-weight: 700; }
  .running { font-weight: 700; color: #374151; }
  .actions-cell { white-space: nowrap; }
  .actions-cell button { margin-right: 4px; }

  /* Collapsible */
  .collapsible-toggle {
    background: none;
    color: #6366f1;
    padding: 0;
    font-size: .9rem;
    cursor: pointer;
    border: none;
    font-weight: 700;
  }
  .collapsible-toggle:hover { text-decoration: underline; opacity: 1; transform: none; }
  .collapsible-body { display: none; margin-top: 14px; }
  .collapsible-body.open { display: block; }

  /* Status */
  .status { text-align: center; padding: 24px; color: #9ca3af; font-size: .9rem; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 900;
    opacity: 0;
    transition: opacity .2s;
  }
  .modal-overlay.visible { opacity: 1; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
    transform: translateY(20px);
    transition: transform .2s;
  }
  .modal-overlay.visible .modal { transform: translateY(0); }
  .modal h2 { margin-bottom: 18px; font-size: 1.1rem; color: #1a1a2e; }
  .modal .form-group { margin-bottom: 14px; flex: 1 1 100%; }
  .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Login screen */
  #login-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8edf5 50%, #f5f0ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .login-box {
    text-align: center;
    width: 320px;
    background: #fff;
    padding: 40px 32px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,.08);
  }
  .login-box h1 {
    margin-bottom: 8px;
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .login-box .login-subtitle { font-size: .85rem; color: #9ca3af; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-size: 1rem;
    margin-bottom: 14px;
    background: #fafbfc;
    transition: border-color .15s, box-shadow .15s;
  }
  .login-box input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,.12);
  }
  .login-box button { width: 100%; padding: 12px; font-size: 1rem; border-radius: 12px; }
  .login-error { color: #dc2626; font-size: .85rem; margin-bottom: 12px; min-height: 1.2em; font-weight: 500; }

  #app { display: none; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { flex: 1 1 100%; }
    .form-group { flex: 1 1 100%; }
    .modal { width: 95%; padding: 20px; }
    .app-header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h1>Kyn's Fund</h1>
    <p class="login-subtitle">Investment Tracker</p>
    <input type="password" id="login-key" placeholder="Enter master key" autofocus>
    <div class="login-error" id="login-error"></div>
    <button onclick="attemptLogin()">Unlock</button>
  </div>
</div>

<!-- App Content -->
<div id="app">

<div class="app-header">
  <h1>Kyn's Investment Fund</h1>
  <button class="lock-btn" onclick="logout()">Lock</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="cards"><div class="status">Loading dashboard...</div></div>

<!-- Add Entry -->
<div class="form-section">
  <h2>Add Entry</h2>
  <div class="form-row">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="entry-date">
    </div>
    <div class="form-group">
      <label>Instrument</label>
      <select id="entry-instrument"><option value="">Loading...</option></select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="entry-desc" placeholder="e.g. Dadi Eid gift">
    </div>
    <div class="form-group">
      <label>Amount</label>
      <input type="number" id="entry-amount" placeholder="5000 or -500">
    </div>
    <button id="btn-add-entry" onclick="addEntry()">Add</button>
  </div>
</div>

<!-- Filter + Table -->
<div>
  <div class="filter-bar">
    <label>Filter:</label>
    <select id="filter-instrument" onchange="renderTable()">
      <option value="">All Instruments</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Date</th><th>Instrument</th><th>Description</th><th>Amount</th><th>Running</th><th></th></tr></thead>
      <tbody id="tx-body"><tr><td colspan="7" class="status">Loading transactions...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Manage Instruments -->
<div class="form-section">
  <button class="collapsible-toggle" onclick="toggleInstruments()">+ Manage Instruments</button>
  <div id="instrument-panel" class="collapsible-body">
    <div class="form-row" style="margin-top:8px">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="inst-name" placeholder="Fund name">
      </div>
      <div class="form-group">
        <label>Folio #</label>
        <input type="text" id="inst-folio" placeholder="e.g. 31593210">
      </div>
      <div class="form-group">
        <label>Platform</label>
        <input type="text" id="inst-platform" placeholder="e.g. IND Money">
      </div>
      <button onclick="addInstrument()">Add Instrument</button>
    </div>
  </div>
</div>

</div><!-- end #app -->

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>Edit Entry</h2>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="edit-date">
    </div>
    <div class="form-group">
      <label>Instrument</label>
      <select id="edit-instrument"></select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="edit-desc">
    </div>
    <div class="form-group">
      <label>Amount</label>
      <input type="number" id="edit-amount">
    </div>
    <div class="modal-actions">
      <button class="btn-danger btn-sm" onclick="deleteEntry()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
      <button id="btn-save-edit" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIGURATION =====
const API_URL = 'https://script.google.com/macros/s/REDACTED_URL/exec';

// ===== STATE =====
let transactions = [];
let instruments = [];
let editingTx = null; // transaction being edited

const fmt = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });

// ===== API HELPERS =====
function isConfigured() {
  return API_URL && !API_URL.includes('YOUR_');
}

async function apiGet(type) {
  const res = await fetch(`${API_URL}?type=${type}`);
  return res.json();
}

async function apiPost(type, data) {
  const res = await fetch(`${API_URL}?type=${type}`, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
  return res.json();
}

// ===== LOAD DATA =====
async function loadAll() {
  if (!isConfigured()) {
    document.getElementById('dashboard').innerHTML = '<div class="status">Please configure API_URL in index.html with your Apps Script deployment URL.</div>';
    document.getElementById('tx-body').innerHTML = '<tr><td colspan="7" class="status">API not configured.</td></tr>';
    return;
  }

  try {
    const [tx, inst] = await Promise.all([apiGet('transactions'), apiGet('instruments')]);
    transactions = tx || [];
    instruments = inst || [];
  } catch (err) {
    document.getElementById('dashboard').innerHTML = '<div class="status">Failed to load data. Check API_URL and deployment.</div>';
    return;
  }

  transactions.sort((a, b) => b.date.localeCompare(a.date));
  populateDropdowns();
  renderDashboard();
  renderTable();
}

// ===== DROPDOWNS =====
function populateDropdowns() {
  const entrySelect = document.getElementById('entry-instrument');
  const filterSelect = document.getElementById('filter-instrument');
  const editSelect = document.getElementById('edit-instrument');
  const opts = instruments.map(i => `<option value="${esc(i.name)}">${esc(i.name)}</option>`).join('');
  entrySelect.innerHTML = opts;
  editSelect.innerHTML = opts;
  filterSelect.innerHTML = '<option value="">All Instruments</option>' + opts;
}

// ===== DASHBOARD =====
function renderDashboard() {
  const el = document.getElementById('dashboard');
  const instMap = {};
  instruments.forEach(i => { instMap[i.name] = { ...i, total: 0, count: 0, lastDate: '', currentValue: i.currentValue || 0 }; });
  let grandTotal = 0;
  let grandCurrentValue = 0;

  transactions.forEach(t => {
    if (instMap[t.instrument]) {
      instMap[t.instrument].total += t.amount;
      instMap[t.instrument].count++;
      if (t.date > instMap[t.instrument].lastDate) instMap[t.instrument].lastDate = t.date;
    }
    grandTotal += t.amount;
  });

  let html = '';
  Object.values(instMap).forEach(i => {
    grandCurrentValue += i.currentValue;
    const gainLoss = i.currentValue - i.total;
    const gainPct = i.total !== 0 ? ((gainLoss / i.total) * 100).toFixed(1) : 0;

    let gainHtml;
    if (!i.currentValue) {
      gainHtml = '<div class="gain gain-neutral">Current value: Not updated</div>';
    } else {
      const cls = gainLoss >= 0 ? 'gain-pos' : 'gain-neg';
      const sign = gainLoss >= 0 ? '+' : '';
      gainHtml = `<div class="current-row"><span class="current-label">Current Value:</span> <span class="current-val">${fmt.format(i.currentValue)}</span></div>
        <div class="gain ${cls}">${sign}${fmt.format(gainLoss)} (${sign}${gainPct}%)</div>`;
    }

    const safeNameAttr = esc(i.name).replace(/'/g, "\\'");
    html += `<div class="card">
      <div class="label">${esc(i.name)}</div>
      <div class="value">${fmt.format(i.total)}</div>
      <div class="meta">Folio: ${esc(i.folio)} &middot; ${esc(i.platform)} &middot; ${i.count} entries</div>
      ${gainHtml}
      <button class="update-val-btn" onclick="showUpdateForm(this, '${safeNameAttr}', ${i.currentValue})">Update Value</button>
      <div class="update-val-form" style="display:none">
        <input type="number" placeholder="Current value" value="${i.currentValue || ''}">
        <button onclick="submitUpdateValue(this, '${safeNameAttr}')">Save</button>
      </div>
    </div>`;
  });

  // Grand total card
  const grandGain = grandCurrentValue - grandTotal;
  const grandPct = grandTotal !== 0 ? ((grandGain / grandTotal) * 100).toFixed(1) : 0;
  let grandGainHtml;
  if (!grandCurrentValue) {
    grandGainHtml = '<div class="gain gain-neutral">Current value: Not updated</div>';
  } else {
    const cls = grandGain >= 0 ? 'gain-pos' : 'gain-neg';
    const sign = grandGain >= 0 ? '+' : '';
    grandGainHtml = `<div class="current-row" style="opacity:.85"><span class="current-label">Current Value:</span> <span class="current-val">${fmt.format(grandCurrentValue)}</span></div>
      <div class="gain ${cls}">${sign}${fmt.format(grandGain)} (${sign}${grandPct}%)</div>`;
  }

  html += `<div class="card grand">
    <div class="label">Grand Total</div>
    <div class="value">${fmt.format(grandTotal)}</div>
    <div class="meta">${transactions.length} total entries</div>
    ${grandGainHtml}
  </div>`;
  el.innerHTML = html;
}

function showUpdateForm(btn, name, currentVal) {
  const form = btn.nextElementSibling;
  const isVisible = form.style.display !== 'none';
  form.style.display = isVisible ? 'none' : 'flex';
  if (!isVisible) form.querySelector('input').focus();
}

async function submitUpdateValue(btn, name) {
  const form = btn.parentElement;
  const input = form.querySelector('input');
  const val = Number(input.value);
  if (isNaN(val) || val < 0) { alert('Enter a valid value.'); return; }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  await apiPost('updateValue', { name, currentValue: val });

  const inst = instruments.find(i => i.name === name);
  if (inst) inst.currentValue = val;

  renderDashboard();
}

// ===== TABLE =====
function renderTable() {
  const filter = document.getElementById('filter-instrument').value;
  const tbody = document.getElementById('tx-body');
  const filtered = filter ? transactions.filter(t => t.instrument === filter) : transactions;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="status">No transactions found.</td></tr>';
    return;
  }

  let running = 0;
  tbody.innerHTML = filtered.map((t, i) => {
    running += t.amount;
    const cls = t.amount >= 0 ? 'amt-pos' : 'amt-neg';
    const idx = transactions.indexOf(t);
    return `<tr>
      <td>${i + 1}</td>
      <td>${esc(t.date)}</td>
      <td>${esc(t.instrument)}</td>
      <td>${esc(t.description)}</td>
      <td class="${cls}">${fmt.format(t.amount)}</td>
      <td class="running">${fmt.format(running)}</td>
      <td class="actions-cell"><button class="btn-secondary btn-sm" onclick="openEditModal(${idx})">Edit</button></td>
    </tr>`;
  }).join('');
}

// ===== EDIT ENTRY =====
function openEditModal(idx) {
  editingTx = transactions[idx];
  document.getElementById('edit-date').value = editingTx.date;
  document.getElementById('edit-instrument').value = editingTx.instrument;
  document.getElementById('edit-desc').value = editingTx.description;
  document.getElementById('edit-amount').value = editingTx.amount;

  const overlay = document.getElementById('edit-modal');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

function closeEditModal() {
  const overlay = document.getElementById('edit-modal');
  overlay.classList.remove('visible');
  setTimeout(() => { overlay.style.display = 'none'; }, 200);
  editingTx = null;
}

async function saveEdit() {
  if (!editingTx) return;
  const date = document.getElementById('edit-date').value;
  const instrument = document.getElementById('edit-instrument').value;
  const description = document.getElementById('edit-desc').value.trim();
  const amount = Number(document.getElementById('edit-amount').value);

  if (!date || !instrument || !description || !amount) { alert('Please fill all fields.'); return; }

  const btn = document.getElementById('btn-save-edit');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  await apiPost('editTransaction', { row: editingTx.row, date, instrument, description, amount });

  // Update local state
  editingTx.date = date;
  editingTx.instrument = instrument;
  editingTx.description = description;
  editingTx.amount = amount;

  transactions.sort((a, b) => b.date.localeCompare(a.date));
  renderDashboard();
  renderTable();

  btn.disabled = false;
  btn.textContent = 'Save';
  closeEditModal();
}

async function deleteEntry() {
  if (!editingTx) return;
  if (!confirm('Delete this entry? This cannot be undone.')) return;

  await apiPost('deleteTransaction', { row: editingTx.row });

  // Remove from local state
  const idx = transactions.indexOf(editingTx);
  if (idx !== -1) transactions.splice(idx, 1);

  renderDashboard();
  renderTable();
  closeEditModal();
}

// Close modal on overlay click
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

// ===== ADD ENTRY =====
async function addEntry() {
  if (!isConfigured()) return;
  const date = document.getElementById('entry-date').value;
  const instrument = document.getElementById('entry-instrument').value;
  const description = document.getElementById('entry-desc').value.trim();
  const amount = Number(document.getElementById('entry-amount').value);

  if (!date || !instrument || !description || !amount) { alert('Please fill all fields.'); return; }

  const btn = document.getElementById('btn-add-entry');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  const entry = { date, instrument, description, amount };
  await apiPost('transaction', entry);

  // Reload to get row numbers from backend
  await loadAll();

  document.getElementById('entry-desc').value = '';
  document.getElementById('entry-amount').value = '';
  btn.disabled = false;
  btn.textContent = 'Add';
}

// ===== ADD INSTRUMENT =====
async function addInstrument() {
  if (!isConfigured()) return;
  const name = document.getElementById('inst-name').value.trim();
  const folio = document.getElementById('inst-folio').value.trim();
  const platform = document.getElementById('inst-platform').value.trim();

  if (!name) { alert('Instrument name is required.'); return; }

  const inst = { name, folio, platform, currentValue: 0 };
  await apiPost('instrument', inst);

  instruments.push(inst);
  populateDropdowns();
  renderDashboard();

  document.getElementById('inst-name').value = '';
  document.getElementById('inst-folio').value = '';
  document.getElementById('inst-platform').value = '';
}

// ===== UTILS =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toggleInstruments() {
  const panel = document.getElementById('instrument-panel');
  const btn = panel.previousElementSibling;
  panel.classList.toggle('open');
  btn.textContent = panel.classList.contains('open') ? '- Manage Instruments' : '+ Manage Instruments';
}

// ===== AUTHENTICATION =====
const VALID_HASH = 'REDACTED_HASH';
const AUTH_CACHE_KEY = 'kyn_auth';

async function sha256(text) {
  if (window.crypto && crypto.subtle) {
    const data = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  // Pure JS SHA-256 fallback
  function rr(n,x){return(x>>>n)|(x<<(32-n));}
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H0=0x6a09e667,H1=0xbb67ae85,H2=0x3c6ef372,H3=0xa54ff53a,
      H4=0x510e527f,H5=0x9b05688c,H6=0x1f83d9ab,H7=0x5be0cd19;
  const bytes=new TextEncoder().encode(text);
  const bits=bytes.length*8;
  const pad=[...bytes,0x80];
  while(pad.length%64!==56) pad.push(0);
  for(let i=7;i>=0;i--) pad.push((bits/(2**(i*8)))&0xff);
  for(let off=0;off<pad.length;off+=64){
    const w=new Array(64);
    for(let i=0;i<16;i++) w[i]=(pad[off+i*4]<<24)|(pad[off+i*4+1]<<16)|(pad[off+i*4+2]<<8)|pad[off+i*4+3];
    for(let i=16;i<64;i++){
      const s0=rr(7,w[i-15])^rr(18,w[i-15])^(w[i-15]>>>3);
      const s1=rr(17,w[i-2])^rr(19,w[i-2])^(w[i-2]>>>10);
      w[i]=(w[i-16]+s0+w[i-7]+s1)|0;
    }
    let a=H0,b=H1,c=H2,d=H3,e=H4,f=H5,g=H6,h=H7;
    for(let i=0;i<64;i++){
      const S1=rr(6,e)^rr(11,e)^rr(25,e);
      const ch=(e&f)^(~e&g);
      const t1=(h+S1+ch+K[i]+w[i])|0;
      const S0=rr(2,a)^rr(13,a)^rr(22,a);
      const maj=(a&b)^(a&c)^(b&c);
      const t2=(S0+maj)|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
    }
    H0=(H0+a)|0;H1=(H1+b)|0;H2=(H2+c)|0;H3=(H3+d)|0;
    H4=(H4+e)|0;H5=(H5+f)|0;H6=(H6+g)|0;H7=(H7+h)|0;
  }
  return [H0,H1,H2,H3,H4,H5,H6,H7].map(v=>(v>>>0).toString(16).padStart(8,'0')).join('');
}

function unlockApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('entry-date').valueAsDate = new Date();
  loadAll();
}

function checkAuth() {
  if (localStorage.getItem(AUTH_CACHE_KEY) === VALID_HASH) {
    unlockApp();
  }
}

async function attemptLogin() {
  const input = document.getElementById('login-key');
  const hash = await sha256(input.value);
  if (hash === VALID_HASH) {
    localStorage.setItem(AUTH_CACHE_KEY, VALID_HASH);
    unlockApp();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect key, try again';
    input.value = '';
    input.focus();
  }
}

function logout() {
  localStorage.removeItem(AUTH_CACHE_KEY);
  location.reload();
}

// Allow Enter key on login input
document.getElementById('login-key').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') attemptLogin();
});

// Escape key closes edit modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeEditModal();
});

// ===== INIT =====
checkAuth();
</script>
